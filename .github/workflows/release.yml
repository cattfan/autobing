name: 'AutoBing Release Pipeline'
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_CONFIGURED: ${{ secrets.TAURI_PRIVATE_KEY != '' }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Frontend Dependencies
        run: |
          cd autobing-app
          npm install

      - name: Install Backend Python Dependencies
        run: |
          python -m pip install --upgrade pip build pyinstaller
          pip install -r requirements.txt

      - name: Compile Python Code to Sidecars
        shell: pwsh
        run: |
          Remove-Item dist -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item build -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "autobing-app/src-tauri/bin"
          python -m PyInstaller --noconfirm --clean --log-level WARN worker_api.spec
          python -m PyInstaller --noconfirm --clean --log-level WARN browser_scanner.spec
          if (-Not (Test-Path "dist/worker_api.exe")) { throw "worker_api.exe not built" }
          if (-Not (Test-Path "dist/browser_scanner.exe")) { throw "browser_scanner.exe not built" }
          Copy-Item "dist/worker_api.exe" -Destination "autobing-app/src-tauri/bin/worker_api.exe" -Force
          Copy-Item "dist/browser_scanner.exe" -Destination "autobing-app/src-tauri/bin/browser_scanner.exe" -Force

      - name: Verify no local runtime data is packaged
        shell: pwsh
        run: |
          $forbidden = @(
            "config/settings.json",
            "config/accounts.json",
            "config/accounts.json.enc",
            "data",
            "profiles",
            ".omx"
          )
          foreach ($path in $forbidden) {
            if (Test-Path $path) {
              throw "Refusing release with local runtime data present: $path"
            }
          }
          $publicForbidden = @(
            "autobing-app/public/mock-dashboard-state.json",
            "autobing-app/public/mock-settings.json"
          )
          foreach ($path in $publicForbidden) {
            if (Test-Path $path) {
              throw "Refusing release with frontend mock data present: $path"
            }
          }

      - name: Prepare unsigned installer config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "autobing-app/build" | Out-Null
          [System.IO.File]::WriteAllText(
            "autobing-app/build/tauri-release-no-updater.json",
            '{"bundle":{"createUpdaterArtifacts":false}}',
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Build Tauri and Create Release
        if: env.TAURI_SIGNING_CONFIGURED == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/autobing-app/src-tauri/target
        with:
          projectPath: autobing-app
          tagName: ${{ github.ref_name }}
          releaseName: "AutoBing Update ${{ github.ref_name }}"
          releaseBody: "Bản cập nhật sinh tự động. Tải file .msi hoặc zip để tiến hành!"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Build Tauri and Create Release (installer only)
        if: env.TAURI_SIGNING_CONFIGURED != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/autobing-app/src-tauri/target
        with:
          projectPath: autobing-app
          tagName: ${{ github.ref_name }}
          releaseName: "AutoBing Update ${{ github.ref_name }}"
          releaseBody: "Bản cập nhật sinh tự động. Tải file .msi hoặc zip để tiến hành!"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --config build/tauri-release-no-updater.json

      - name: Checkout Main Branch to Push update.json
        uses: actions/checkout@v4
        with:
          ref: main
          path: update-repo

      - name: Update update.json
        shell: pwsh
        run: |
          $VERSION = ("${{ github.ref_name }}" -replace "^v", "")
          $JSON_PATH = "update-repo/update.json"

          if ([string]::IsNullOrWhiteSpace("${{ secrets.TAURI_PRIVATE_KEY }}")) {
            Write-Host "TAURI_PRIVATE_KEY is not configured; installer release was created, skipping update.json generation."
            exit 0
          }

          $bundleRoot = "autobing-app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          $artifact = Get-ChildItem -Path $bundleRoot -Recurse -Filter "*.msi.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($null -eq $artifact) {
            Get-ChildItem -Path $bundleRoot -Recurse | Select-Object FullName
            Write-Host "No .msi.zip updater artifact found; installer release was created, skipping update.json generation."
            exit 0
          }

          $sigPath = "$($artifact.FullName).sig"
          if (-Not (Test-Path $sigPath)) {
            Get-ChildItem -Path $bundleRoot -Recurse | Select-Object FullName
            Write-Host "Updater signature file missing: $sigPath; installer release was created, skipping update.json generation."
            exit 0
          }
          $SIGNATURE = (Get-Content -Path $sigPath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($SIGNATURE)) {
            Write-Host "Updater signature is empty; installer release was created, skipping update.json generation."
            exit 0
          }
          if ($SIGNATURE -match "ERROR:") {
            Write-Host "Updater signature contains error placeholder; installer release was created, skipping update.json generation."
            exit 0
          }

          $assetName = $artifact.Name
          $URL = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$assetName"

          $UPDATE_PAYLOAD = @{
              version = $VERSION
              notes = "Update $VERSION automatically published."
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                  "windows-x86_64" = @{
                      signature = $SIGNATURE
                      url = $URL
                  }
              }
          }

          $UPDATE_PAYLOAD | ConvertTo-Json -Depth 5 > $JSON_PATH
          $generated = Get-Content -Path $JSON_PATH -Raw
          if ($generated -match "ERROR:" -or $generated -notmatch "https://github.com/") {
            throw "Generated update.json failed validation"
          }
          $null = $generated | ConvertFrom-Json

      - name: Commit and Push update.json
        run: |
          cd update-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m "chore(release): auto update update.json for ${{ github.ref_name }}"
          git push
